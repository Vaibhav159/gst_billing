name: Docker Publish

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Django Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/gst-billing:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/gst-billing:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/gst-billing:buildcache,mode=max

      - name: Build and push Nginx
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/gst-billing-nginx:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/gst-billing-nginx:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/gst-billing-nginx:buildcache,mode=max
