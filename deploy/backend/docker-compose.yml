# Docker Compose for Oracle Cloud deployment
# Backend-only: Django API + PostgreSQL + Redis
# Frontend is deployed separately on Cloudflare Pages / GitHub Pages

services:
  # PostgreSQL Database
  db:
    image: postgres:13
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME:-gst_billing}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django API server
  web:
    build:
      context: ../../  # Points to the gst_billing root
      dockerfile: deploy/backend/Dockerfile
    image: ${DOCKER_USERNAME:-gstbilling}/gst-billing-api:latest
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
      - ./logs:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=gst_billing.production_settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-gst_billing}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "mkdir -p logs &&
               python manage.py migrate &&
               python manage.py collectstatic --noinput &&
               python create_superuser.py &&
               gunicorn gst_billing.wsgi:application
                 --bind 0.0.0.0:8000
                 --workers 3
                 --timeout 120
                 --log-level info
                 --access-logfile logs/gunicorn-access.log
                 --error-logfile logs/gunicorn-error.log"

volumes:
  postgres_data:
  redis_data:
  media_volume:
  static_volume:
