version: '3.8'

volumes:
  gst_redis_data: {}
  gst_static_volume: {}
  gst_media_volume: {}

services:
  web:
    image: vaibhav198/gst-billing:latest
    restart: unless-stopped
    volumes:
      - gst_static_volume:/app/staticfiles
      - gst_media_volume:/app/media
    env_file:
      - ./.env
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      # Change this to whatever URL your Cosmos dashboard serves this app under
      - CSRF_TRUSTED_ORIGINS=http://billing.cheq.dpdns.org,https://billing.cheq.dpdns.org,http://localhost:8060
      - REDIS_HOST=redis
      # Note: DB_HOST, DB_USER, etc., will be pulled automatically from your .env file
    depends_on:
      - redis
    command: >
      bash -c "mkdir -p logs &&
               python manage.py migrate &&
               python manage.py collectstatic --noinput &&
               gunicorn gst_billing.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 4 --log-level info"

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - gst_redis_data:/data

  nginx:
    # Uses the image built via Github Actions
    image: vaibhav198/gst-billing-nginx:latest
    restart: unless-stopped
    ports:
      # Map to a port Cosmos can reverse proxy (e.g. 8060)
      - "8060:80"
    volumes:
      - gst_static_volume:/var/www/static:ro
      - gst_media_volume:/var/www/media:ro
    depends_on:
      - web
